<div class="app">
  <div
    class="overlay"
    [class.open]="sidebarOpen()"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <app-lesson-nav
    [lessons]="lessons"
    [activeLessonId]="activeLessonId()"
    [isOpen]="sidebarOpen()"
    (lessonSelected)="selectLesson($event)"
    (sidebarClose)="closeSidebar()"
  />

  <main class="main">
    <div class="topbar">
      <button
        class="menu-toggle"
        (click)="openSidebar()"
        aria-label="Открыть меню"
      >
        ☰
      </button>
      <div class="breadcrumb">
        <strong>{{ breadcrumb() }}</strong>
      </div>
      <div style="display: flex; align-items: center; gap: 0.6rem">
        <div class="progress-info">
          {{ activeLessonId() || "—" }} / {{ lessons.length }}
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" [style.width]="progressWidth()"></div>
        </div>
      </div>

      <div class="donate-wrap">
        <button class="btn-donate" (click)="donateOpen.set(!donateOpen())">
          ❤️ {{ langSvc.lang() === 'en' ? 'Support' : 'Поддержать' }}
        </button>
        @if (donateOpen()) {
          <div class="donate-popup">
            <p class="donate-title">
              {{ langSvc.lang() === 'en' ? 'Choose a payment method:' : 'Выберите способ оплаты:' }}
            </p>
            <a
              class="donate-option donate-card"
              href="https://web.tribute.tg/d/IJc"
              target="_blank"
              rel="noopener"
              (click)="donateOpen.set(false)"
            >
              💳 {{ langSvc.lang() === 'en' ? 'Card (Tribute)' : 'Картой (Tribute)' }}
            </a>
            <a
              class="donate-option donate-paypal"
              href="https://ko-fi.com/aizana"
              target="_blank"
              rel="noopener"
              (click)="donateOpen.set(false)"
            >
              <svg class="paypal-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.93 4.778-4.005 7.201-9.138 7.201h-2.19a.563.563 0 0 0-.556.479l-1.187 7.527h-.506l-.24 1.516a.56.56 0 0 0 .554.647h3.882c.46 0 .85-.334.922-.788.06-.26.76-4.852.816-5.09a.932.932 0 0 1 .923-.788h.58c3.76 0 6.705-1.528 7.565-5.946.36-1.847.174-3.388-.777-4.471z"/></svg>
              PayPal / Ko-fi
            </a>
          </div>
        }
      </div>
    </div>

    <div class="content" id="mainContent">
      <router-outlet />
    </div>
  </main>
</div>
